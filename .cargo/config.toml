# ts-rs writes generated TypeScript files into this directory. The codegen
# binding types now live in `crates/microflow-core`, so their export tests run
# as part of the workspace (`cargo test` from the repo root). This root config
# makes those runs land the `.ts` files in the same place the frontend imports
# from (`apps/web/src/lib/bindings/`) as the per-crate src-tauri config does.
#
# Path is resolved relative to *this* config.toml (the repo root).
[env]
TS_RS_EXPORT_DIR = { value = "apps/web/src/lib/bindings", relative = true, force = true }

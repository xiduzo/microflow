name: microflow-t-stack

services:
  postgres:
    image: postgres
    container_name: microflow-t-stack-postgres
    environment:
      POSTGRES_DB: microflow-t-stack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - microflow-t-stack_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  microflow-t-stack_postgres_data:

name: 'build'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - platform: macos-14
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          # macOS Intel
          - platform: macos-14
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          # Windows
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
          # Linux
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''

    runs-on: ${{ matrix.platform }}
    # Guard: a stuck Apple notarization (`notarytool --wait` blocks indefinitely)
    # otherwise hangs the job to GitHub's 6h default. Fail fast + re-runnable.
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # wasm32 target so `bun run build` can compile microflow-codegen-wasm
          # (the browser code generator) before `vite build`.
          targets: ${{ matrix.target }}, wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          # Pin a modern wasm-pack: the action's `latest` resolves to a stale
          # v0.9.1 whose bundled wasm-opt can't parse current wasm-bindgen output
          # ("Fatal: error in parsing input"). v0.13.x ships a working wasm-opt.
          version: 'v0.13.1'

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libudev-dev \
            libasound2-dev

      - name: Install dependencies
        run: bun install

      - name: Import Apple Developer Certificate
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm certificate.p12

      - name: Verify Certificate
        if: startsWith(matrix.platform, 'macos')
        run: |
          echo "Available signing identities:"
          security find-identity -v -p codesigning build.keychain
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep -E "Apple Development|Developer ID Application|Apple Distribution" || true)
          if [ -z "$CERT_INFO" ]; then
            echo "::error::No valid signing identity found in build.keychain"
            exit 1
          fi
          CERT_ID=$(echo "$CERT_INFO" | head -n1 | awk -F'"' '{print $2}')
          echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV
          echo "Using signing identity: $CERT_ID"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Increase Node.js heap for Vite production build (OOM on CI)
          NODE_OPTIONS: '--max-old-space-size=4096'
          # Frontend env vars (inlined by Vite at build time)
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
          # Required for updater artifact signing (createUpdaterArtifacts: true in tauri.conf.json)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/web
          args: ${{ matrix.args }}

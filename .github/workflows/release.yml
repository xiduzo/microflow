name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: false

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      tag_name: ${{ steps.get_version.outputs.tag }}
    steps:
      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Microflow ${{ steps.get_version.outputs.tag }}
          draft: true
          prerelease: false
          generate_release_notes: true

  bump-version:
    needs: create-release
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Bump version files
        run: |
          TAG="${{ needs.create-release.outputs.tag_name }}"
          VERSION="${TAG#v}"
          echo "Bumping version to $VERSION"

          # Update tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' apps/web/src-tauri/tauri.conf.json > tmp.json && mv tmp.json apps/web/src-tauri/tauri.conf.json

          # Update Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" apps/web/src-tauri/Cargo.toml

      - name: Commit and push version bump
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/src-tauri/tauri.conf.json apps/web/src-tauri/Cargo.toml

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "Version already up to date, skipping commit"
            echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: bump version to ${{ needs.create-release.outputs.tag_name }}"
            git push origin main
            echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          fi

  build-tauri:
    needs: [create-release, bump-version]
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Intel
          - platform: macos-14
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          # macOS Apple Silicon
          - platform: macos-14
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          # Windows
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
          # Linux
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''

    runs-on: ${{ matrix.platform }}
    # Guard: a stuck Apple notarization (`notarytool --wait` blocks indefinitely)
    # otherwise hangs the job to GitHub's 6h default. Fail fast + re-runnable.
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.commit_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # wasm32 target so Tauri's beforeBuildCommand (`bun run build`) can
          # compile the microflow-*-wasm crates before `vite build`.
          targets: ${{ matrix.target }}, wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          # Pin a modern wasm-pack — the action's `latest` is a stale v0.9.1
          # whose wasm-opt can't parse current wasm-bindgen output.
          version: 'v0.13.1'

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libudev-dev

      - name: Install dependencies
        run: bun install

      - name: Import Apple certificate (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychain -d user -s build.keychain
          rm certificate.p12

      - name: Verify Certificate (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          echo "Available signing identities:"
          security find-identity -v -p codesigning build.keychain
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep -E "Apple Development|Developer ID Application|Apple Distribution" || true)
          if [ -z "$CERT_INFO" ]; then
            echo "::error::No valid signing identity found in build.keychain"
            exit 1
          fi
          CERT_ID=$(echo "$CERT_INFO" | head -n1 | awk -F'"' '{print $2}')
          echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV
          echo "Using signing identity: $CERT_ID"

      - name: Verify updater signing key (non-Windows)
        if: runner.os != 'Windows'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set. Add it to your repository secrets."
            exit 1
          fi

      - name: Verify updater signing key (Windows)
        if: runner.os == 'Windows'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: pwsh
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Error "TAURI_SIGNING_PRIVATE_KEY secret is not set. Add it to your repository secrets."
            exit 1
          }

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Increase Node.js heap for Vite production build (OOM on CI)
          NODE_OPTIONS: '--max-old-space-size=4096'
          # Frontend env vars (inlined by Vite at build time)
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
          # Updater signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS signing
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/web
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          draft: false
